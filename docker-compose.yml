services:

  db:
    image: postgres:16-alpine
    container_name: neurotwin-postgres
    restart: unless-stopped

    environment:
      POSTGRES_DB: neurotwin
      POSTGRES_USER: neurotwin_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}

    volumes:
      - neurotwin_postgres_data:/var/lib/postgresql/data

    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U neurotwin_user -d neurotwin"
        ]
      interval: 10s
      timeout: 5s
      retries: 5


  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile

    container_name: neurotwin-backend
    restart: unless-stopped

    env_file:
      - ./backend/.env

    environment:
      ENVIRONMENT: production
      DEBUG: "false"
      HOST: 0.0.0.0
      PORT: 8000

      ALLOWED_HOSTS: >-
        localhost,127.0.0.1,testserver

      CORS_ORIGINS: >-
        http://localhost:3000,http://localhost:5173

      ENABLE_HTTPS_REDIRECT: "false"

      DATABASE_URL: >-
        postgresql+psycopg2://neurotwin_user:${POSTGRES_PASSWORD}@db:5432/neurotwin

      OLLAMA_BASE_URL: >-
        http://host.docker.internal:11434

    ports:
      - "5432:5432"

    volumes:
      - neurotwin_uploads:/app/uploads

    depends_on:
      db:
        condition: service_healthy


volumes:

  neurotwin_postgres_data:

  neurotwin_uploads: